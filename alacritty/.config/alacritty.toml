[font]
size = 13.5

[font.normal]
family = "FiraCode Nerd Font"
style = "Medium"

[font.bold]
style = "SemiBold"

[font.italic]
style = "Retina"

[font.bold_italic]
style = "Bold"

[font.offset]
x = 0
y = 0

[font.glyph_offset]
x = 0
y = 0

[general]
import = ["~/.config/alacritty/themes/tokyonight_night.toml"]

[keyboard]
bindings = [
    { key = "Left", mods = "Alt", chars = "\u001BB" },
    { key = "Right", mods = "Alt", chars = "\u001BF" },
    { key = "Left", mods = "Command", chars = "\u001BOH" },
    { key = "Right", mods = "Command", chars = "\u001BOF" },
]

[window.dimensions]
columns = 155
lines = 58

[window]
# decorations = "buttonless"
decorations = "full"
opacity = 1
option_as_alt = "Both"
padding.x = 20
padding.y = 20
