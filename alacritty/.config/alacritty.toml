[font]
size = 13.0

[font.bold]
style = "Bold"

[font.bold_italic]
style = "Bold Italic"

[font.italic]
style = "Italic"

[font.normal]
family = "FiraCode Nerd Font"

[general]
import = ["~/.config/alacritty/themes/duskfox.toml"]

[keyboard]
bindings = [
    { key = "Left", mods = "Alt", chars = "\u001BB" },
    { key = "Right", mods = "Alt", chars = "\u001BF" },
    { key = "Left", mods = "Command", chars = "\u001BOH" },
    { key = "Right", mods = "Command", chars = "\u001BOF" },
    { key = "Back", mods = "Command", chars = "\u001b[109;5u" },

    # Explicitly set Ctrl+M as \r, so that it gets recognized by tmux
    { key = "M", mods = "Control", chars = "\r" },
]

[window.dimensions]
columns = 160
lines = 55

[window]
padding.x = 20
padding.y = 20
decorations = "buttonless"
option_as_alt = "Both"
# opacity = 0.975
