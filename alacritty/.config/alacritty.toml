[font]
size = 13.0

[font.normal]
family = "FiraCode Nerd Font Mono"
style = "Regular"

[font.bold]
family = "FiraCode Nerd Font Mono"
style = "Bold"

[font.italic]
family = "FiraCode Nerd Font Mono"
style = "Retina"

[font.bold_italic]
family = "FiraCode Nerd Font Mono"
style = "SemiBold"

[font.offset]
x = 0
y = 0

[font.glyph_offset]
x = 0
y = 0

[general]
import = ["~/.config/alacritty/themes/tokyonight_night.toml"]

[keyboard]
bindings = [
    { key = "Left", mods = "Alt", chars = "\u001BB" },
    { key = "Right", mods = "Alt", chars = "\u001BF" },
    { key = "Left", mods = "Command", chars = "\u001BOH" },
    { key = "Right", mods = "Command", chars = "\u001BOF" },
]

[window.dimensions]
columns = 160
lines = 55

[window]
decorations = "buttonless"
opacity = 1
option_as_alt = "Both"
padding.x = 20
padding.y = 20
